<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lector PSC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="contenedor">
    <h1>Lector de archivos PSC</h1>
    <p>Sube un archivo de PSeInt con extensión .psc</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="archivo" accept=".psc" required>
        <button type="submit">Leer archivo</button>
    </form>

    {% if nombre_archivo %}
        <h2>{{ nombre_archivo }}</h2>
    {% endif %}

    {% if contenido %}
        <pre>{{ contenido }}</pre>
    {% endif %}
</div>

</body>
</html>
